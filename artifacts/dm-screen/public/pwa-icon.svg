<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="1" stop-color="#050009"/>
    </linearGradient>
  </defs>
  <!-- Full bleed for "maskable" purpose; the actual badge sits within the
       inner 80% safe zone so OS-applied masks won't crop key content. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(51 51)">
    <rect width="410" height="410" rx="72" fill="url(#bg)"/>
    <rect x="6" y="6" width="398" height="398" rx="66" fill="none"
          stroke="#7c3aed" stroke-opacity="0.55" stroke-width="4"/>
    <text x="205" y="278" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="200" fill="#c084fc">DM</text>
  </g>
</svg>
