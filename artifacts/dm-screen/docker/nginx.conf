# nginx site config for the Selene DM Screen static SPA.
#
# Three notable behaviours:
#  - SPA fallback: any unknown path falls back to /index.html. The app
#    doesn't use client-side routing today, but this is the future-proof
#    pattern and costs nothing.
#  - Cache headers: /assets/* gets a long-lived immutable cache because
#    Vite emits hashed filenames; sw.js / index.html / manifest /
#    registerSW.js are marked no-cache so PWA updates land on next reload
#    rather than being trapped behind an aggressive intermediate cache.
#  - Security headers: defense-in-depth headers (CSP, X-Frame-Options,
#    X-Content-Type-Options, Referrer-Policy, Permissions-Policy) are
#    defined in security-headers.conf and `include`d from every location.
#    nginx `add_header` doesn't inherit when a child block has its own,
#    so each location that sets Cache-Control has to re-pull the snippet.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Server-level default for any location WITHOUT its own add_header.
    include /etc/nginx/conf.d/security-headers.conf;

    # Compress text-y responses. The dm-screen JS bundle is ~1.6 MiB raw;
    # gzip cuts that to ~354 KiB on the wire.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Hashed Vite asset bundles — safe to cache forever.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }

    # PWA control surfaces — never cache. The Workbox SW handles its own
    # versioning; intermediates must not pin an old copy.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }

    # SPA fallback for unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't bleed dotfiles or repo metadata if any sneak in.
    location ~ /\. { deny all; }
}
