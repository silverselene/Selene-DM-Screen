# nginx site config for the Selene DM Screen static SPA.
#
# SUB-PATH DEPLOYS: this config always serves at the container root (`/`).
# When the bundle is built with BASE_PATH=/dm/, the HTML/SW/manifest reference
# absolute `/dm/...` URLs, but the files still live at the image root and these
# `location` blocks stay root-anchored. So the reverse proxy in front of the
# container MUST STRIP the `/dm/` prefix before forwarding — otherwise asset
# requests miss `location /assets/`, fall through to the SPA fallback, and the
# browser gets `index.html` (text/html) for a `.js` request, which a strict CSP
# rejects → blank app, and the PWA no-cache rules never apply. A pass-through
# proxy that forwards `/dm/` unchanged is the failure mode; nginx strips with a
# trailing slash on `proxy_pass` (`proxy_pass http://container:8080/;`), Traefik
# with a StripPrefix middleware. See README "Deploying under a sub-path".
#
# Three notable behaviours:
#  - SPA fallback: any unknown path falls back to /index.html. The app
#    doesn't use client-side routing today, but this is the future-proof
#    pattern and costs nothing.
#  - Cache headers: /assets/* gets a long-lived immutable cache because
#    Vite emits hashed filenames; sw.js / index.html / manifest /
#    registerSW.js are marked no-cache so PWA updates land on next reload
#    rather than being trapped behind an aggressive intermediate cache.
#  - Security headers: defense-in-depth headers (CSP, X-Frame-Options,
#    X-Content-Type-Options, Referrer-Policy, Permissions-Policy) are
#    defined in security-headers.conf and `include`d from every location.
#    nginx `add_header` doesn't inherit when a child block has its own,
#    so each location that sets Cache-Control has to re-pull the snippet.

server {
    # Port 8080, not 80: the runtime image (nginxinc/nginx-unprivileged) runs
    # nginx as a non-root user that can't bind privileged ports. Compose maps
    # the host port to 8080.
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Server-level default for any location WITHOUT its own add_header.
    include /etc/nginx/conf.d/security-headers.conf;

    # Compress text-y responses. The dm-screen JS bundle is ~1.6 MiB raw;
    # gzip cuts that to ~354 KiB on the wire.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Hashed Vite asset bundles — safe to cache forever.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }

    # PWA control surfaces — never cache. The Workbox SW handles its own
    # versioning; intermediates must not pin an old copy.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri =404;
    }

    # SPA fallback for unknown routes. `try_files … /index.html` serves the
    # shell via an internal subrequest, which does NOT run the
    # `location = /index.html` block — so its no-cache header wouldn't reach a
    # deep-link 200. Set Cache-Control here too so the freshly-served shell is
    # never pinned by an intermediate cache. (Hashed bundles under /assets/ are
    # matched by the more-specific block above and keep their immutable cache.)
    location / {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Don't bleed dotfiles or repo metadata if any sneak in.
    location ~ /\. { deny all; }
}
