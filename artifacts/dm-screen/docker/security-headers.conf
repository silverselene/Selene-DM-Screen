# Shared security response headers. Included from every `location` in
# nginx.conf — `add_header` directives don't inherit from a parent
# `server {}` block into any child `location` that declares its own
# `add_header`, so we have to repeat them. Kept in a snippet so the list
# only has to be maintained in one place.
#
# CSP notes:
#  - script-src is locked to 'self' — no 'unsafe-inline'. The build
#    emits only external <script src="…"> tags (the main bundle plus
#    vite-plugin-pwa's external /registerSW.js); any future change that
#    re-introduces an inline <script> or inline event handler MUST be
#    weighed against losing CSP's script-XSS defense.
#  - style-src keeps 'unsafe-inline' because Tailwind v4's emitted
#    utility CSS uses inline @layer declarations and runtime style
#    injection (e.g. shadcn/ui portal positioning). Moving styles to
#    nonces would require shipping a per-request rendered shell —
#    a non-static deploy. Accepted trade-off for now.
#  - fonts.googleapis.com (stylesheet) + fonts.gstatic.com (woff2)
#    cover the Google Fonts pair the app loads at runtime. They must
#    appear in connect-src as well as style-src/font-src: this snippet is
#    also served on /sw.js, and a service worker's fetch() calls are
#    governed by the CSP of its own script response — the Workbox
#    runtimeCaching routes in vite.config.ts fetch the font files from
#    INSIDE the worker to populate the offline cache. With connect-src
#    'self' alone, those fetches are blocked and fonts silently degrade
#    to system fallbacks in the Docker deploy (dev/preview send no CSP,
#    so the breakage only shows up in the container).
#  - http://127.0.0.1:38900 / http://localhost:38900 are the optional local
#    AI bridge (services/ai-bridge). The bridge binds 127.0.0.1 only, but the
#    AI Chat widget's fetch()es to it are governed by THIS page's CSP — with
#    connect-src 'self' alone they're blocked in the container and the widget
#    is stuck "offline" even while the bridge is running (dev/preview send no
#    CSP, so this only breaks in the Docker deploy). Both host spellings are
#    listed because the browser treats them as distinct origins. Coupled
#    config: 38900 must match the bridge's AI_BRIDGE_PORT and the widget's
#    BRIDGE_URL (src/lib/aiBridge.ts); the bridge's origin allowlist
#    (AI_BRIDGE_ALLOWED_ORIGINS) must include wherever this SPA is served.
#  - worker-src covers the PWA service worker at /sw.js.
#  - frame-ancestors 'none' is the modern equivalent of X-Frame-Options
#    DENY; we send both for older client coverage. This governs who can
#    embed US — unrelated to frame-src below, which governs what WE embed.
#  - frame-src is a curated allowlist (YouTube, Spotify, SoundCloud,
#    Vimeo) for the Portal widget's iframe embeds, NOT a blanket `https:`.
#    Keep this list in sync with `EMBED_HOSTS` / `toEmbedUrl` in
#    src/lib/portalEmbed.ts — a provider only works end to end if it's
#    permitted in both places (toEmbedUrl canonicalizes every URL onto one
#    of exactly these hosts; portalEmbed.test.ts asserts that invariant).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:38900 http://localhost:38900 https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://open.spotify.com https://w.soundcloud.com https://player.vimeo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
