# Plain CI: the full workspace typecheck + test suite on every push/PR.
#
# This exists because `pnpm build` deliberately runs only typecheck:deployable
# (artifacts + scripts — the Docker image never installs the bridge's Agent-SDK
# deps), so nothing else ever compiles services/ai-bridge against the shared
# @workspace/bridge-protocol wire contract. Without this job, a protocol drift
# between the bridge and the AI Chat widget could merge unchecked — the exact
# silent-runtime-mis-parse the types-only package exists to prevent.
#
# Actions are SHA-pinned (not mutable tags), matching the Claude workflows.
name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Reads the pnpm version from package.json's `packageManager` field.
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Full workspace typecheck — including services/ai-bridge, which the
      # build's typecheck:deployable intentionally skips.
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
