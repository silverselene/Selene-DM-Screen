name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Gate on the PR author's repo relationship. This job holds
    # CLAUDE_CODE_OAUTH_TOKEN (subscription spend) + id-token:write and runs
    # attacker-authored PR content through Claude, so on a public repo a
    # drive-by PR from anyone must NOT be able to trigger it — same trust gate
    # claude.yml applies to @claude mentions. Fork PRs from non-members carry
    # author_association CONTRIBUTOR/NONE/FIRST_TIME_CONTRIBUTOR and are
    # skipped; a maintainer can still review them manually.
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 — SHA-pinned: these jobs hold CLAUDE_CODE_OAUTH_TOKEN + id-token:write, and a mutable tag can be repointed
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1.0.173 — SHA-pinned (see checkout note)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

